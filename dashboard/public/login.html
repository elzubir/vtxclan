<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VTX Clan — Command Center Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/styles.css" />
</head>
<body>
  <div class="aurora"></div>
  <div class="grid-overlay"></div>
  <canvas id="bg-canvas"></canvas>

  <div class="login-wrap">
    <form class="login-card" id="login-form">
      <div class="login-logo gradient-text">VTX CLAN</div>
      <div class="login-sub">Command Center</div>
      <input type="password" id="password" placeholder="Dashboard password" autocomplete="current-password" autofocus />
      <button class="btn" type="submit">Enter Command Center</button>
      <div class="error-msg" id="error"></div>
    </form>
  </div>

  <script src="/js/bg.js"></script>
  <script src="/js/login.js"></script>
</body>
</html>
